[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

# Route /api/kroger/* through the serverless function
[[redirects]]
  from   = "/api/kroger/*"
  to     = "/.netlify/functions/kroger/:splat"
  status = 200

# SPA fallback — all other routes serve index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
